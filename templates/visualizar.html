<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización de Actividades de Estudio</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .tab-content {
            padding: 20px 0;
        }
        
        .accordion-button:not(.collapsed) {
            background-color: #2d2d2d;
            color: #fff;
        }
        
        .accordion-button:focus {
            box-shadow: 0 0 0 0.25rem rgba(58, 134, 255, 0.25);
        }
        
        .accordion-button::after {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23fff'%3e%3cpath fill-rule='evenodd' d='M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z'/%3e%3c/svg%3e");
        }
        
        .nav-tabs .nav-link.active {
            background-color: #2d2d2d;
            color: #fff;
            border-color: #444;
        }
        
        .nav-tabs .nav-link {
            color: #e0e0e0;
        }
        
        .tarea-card {
            transition: transform 0.2s;
            margin-bottom: 15px;
        }
        
        .tarea-card:hover {
            transform: translateY(-5px);
        }
        
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .export-btn {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .badge-alta {
            background-color: #ff4d5e;
        }
        
        .badge-media {
            background-color: #ffb700;
            color: #212529;
        }
        
        .badge-baja {
            background-color: #3a86ff;
        }
    </style>
</head>
<body>
    <div class="container mt-4 fade-in">
        <div class="header-section">
            <h1><i class="bi bi-list-task me-2"></i>Visualización de Actividades</h1>
            <div>
                <a href="/" class="btn btn-outline-primary me-2">
                    <i class="bi bi-calendar me-1"></i>Volver al Calendario
                </a>
                <a href="/exportar_csv" class="btn btn-success export-btn">
                    <i class="bi bi-file-earmark-excel"></i>Exportar a CSV
                </a>
            </div>
        </div>
        
        <div class="card shadow border-0">
            <div class="card-body">
                <ul class="nav nav-tabs" id="visualizacionTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="fecha-tab" data-bs-toggle="tab" data-bs-target="#fecha" type="button" role="tab" aria-controls="fecha" aria-selected="true">
                            <i class="bi bi-calendar-date me-1"></i>Por Fecha
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="proyecto-tab" data-bs-toggle="tab" data-bs-target="#proyecto" type="button" role="tab" aria-controls="proyecto" aria-selected="false">
                            <i class="bi bi-folder me-1"></i>Por Proyecto
                        </button>
                    </li>
                </ul>
                <div class="tab-content" id="visualizacionTabContent">
                    <div class="tab-pane fade show active" id="fecha" role="tabpanel" aria-labelledby="fecha-tab">
                        <div class="accordion" id="accordionFechas">
                            <!-- Aquí se cargarán dinámicamente las tareas agrupadas por fecha -->
                            <div class="text-center py-5" id="cargando-fechas">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Cargando...</span>
                                </div>
                                <p class="mt-2">Cargando actividades...</p>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="proyecto" role="tabpanel" aria-labelledby="proyecto-tab">
                        <div class="accordion" id="accordionProyectos">
                            <!-- Aquí se cargarán dinámicamente las tareas agrupadas por proyecto -->
                            <div class="text-center py-5" id="cargando-proyectos">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Cargando...</span>
                                </div>
                                <p class="mt-2">Cargando actividades...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            function escapeHTML(value) {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            function manejarRespuesta(response) {
                if (!response.ok) {
                    throw new Error('No se pudieron cargar las actividades.');
                }
                return response.json();
            }

            // Cargar tareas por fecha
            fetch('/api/tareas_por_fecha')
                .then(manejarRespuesta)
                .then(data => {
                    const accordionFechas = document.getElementById('accordionFechas');
                    const cargandoFechas = document.getElementById('cargando-fechas');
                    
                    if (data.length === 0) {
                        cargandoFechas.innerHTML = '<p class="text-muted">No hay actividades registradas</p>';
                        return;
                    }
                    
                    cargandoFechas.style.display = 'none';
                    
                    // Ordenar por fecha (más reciente primero)
                    data.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
                    
                    data.forEach((grupo, index) => {
                        const fecha = new Date(grupo.fecha);
                        const fechaFormateada = fecha.toLocaleDateString('es-ES', { 
                            weekday: 'long', 
                            year: 'numeric', 
                            month: 'long', 
                            day: 'numeric' 
                        });
                        
                        const accordionItem = document.createElement('div');
                        accordionItem.className = 'accordion-item';
                        
                        const horasTotales = grupo.tareas.reduce((total, tarea) => total + tarea.horas, 0);
                        
                        accordionItem.innerHTML = `
                            <h2 class="accordion-header" id="heading-fecha-${index}">
                                <button class="accordion-button ${index !== 0 ? 'collapsed' : ''}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-fecha-${index}" aria-expanded="${index === 0 ? 'true' : 'false'}" aria-controls="collapse-fecha-${index}">
                                    <div class="d-flex justify-content-between w-100 me-3">
                                        <span><i class="bi bi-calendar-date me-2"></i>${escapeHTML(fechaFormateada)}</span>
                                        <span class="badge bg-primary rounded-pill">${grupo.tareas.length} actividades · ${horasTotales}h</span>
                                    </div>
                                </button>
                            </h2>
                            <div id="collapse-fecha-${index}" class="accordion-collapse collapse ${index === 0 ? 'show' : ''}" aria-labelledby="heading-fecha-${index}" data-bs-parent="#accordionFechas">
                                <div class="accordion-body">
                                    <div class="row">
                                        ${grupo.tareas.map(tarea => {
                                            const importanciaClass = tarea.importancia.toLowerCase() === 'alta' ? 'badge-alta' : 
                                                                    (tarea.importancia.toLowerCase() === 'media' ? 'badge-media' : 'badge-baja');
                                            const importanciaIcon = tarea.importancia.toLowerCase() === 'alta' ? '<i class="bi bi-exclamation-circle me-1"></i>' : 
                                                                  (tarea.importancia.toLowerCase() === 'media' ? '<i class="bi bi-star me-1"></i>' : '<i class="bi bi-check-circle me-1"></i>');
                                            
                                            return `
                                                <div class="col-md-6 col-lg-4">
                                                    <div class="card tarea-card">
                                                        <div class="card-body">
                                                            <h5 class="card-title">${escapeHTML(tarea.tema)}</h5>
                                                            <h6 class="card-subtitle mb-2 text-muted"><i class="bi bi-folder me-1"></i>${escapeHTML(tarea.proyecto)}</h6>
                                                            <div class="d-flex justify-content-between align-items-center mt-3">
                                                                <span class="badge ${importanciaClass}">${importanciaIcon}${escapeHTML(tarea.importancia)}</span>
                                                                <span><i class="bi bi-clock me-1"></i>${escapeHTML(tarea.horas)}h</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            </div>
                        `;
                        
                        accordionFechas.appendChild(accordionItem);
                    });
                })
                .catch(error => {
                    console.error('Error al cargar tareas por fecha:', error);
                    document.getElementById('cargando-fechas').innerHTML = '<p class="text-danger">Error al cargar las actividades</p>';
                });
            
            // Cargar tareas por proyecto cuando se selecciona esa pestaña
            document.getElementById('proyecto-tab').addEventListener('click', function() {
                const accordionProyectos = document.getElementById('accordionProyectos');
                const cargandoProyectos = document.getElementById('cargando-proyectos');
                
                // Si ya se cargaron los proyectos, no hacer nada
                if (accordionProyectos.children.length > 1) return;
                
                fetch('/api/tareas_por_proyecto')
                    .then(manejarRespuesta)
                    .then(data => {
                        if (data.length === 0) {
                            cargandoProyectos.innerHTML = '<p class="text-muted">No hay actividades registradas</p>';
                            return;
                        }
                        
                        cargandoProyectos.style.display = 'none';
                        
                        // Ordenar por nombre de proyecto
                        data.sort((a, b) => a.proyecto.localeCompare(b.proyecto));
                        
                        data.forEach((grupo, index) => {
                            const accordionItem = document.createElement('div');
                            accordionItem.className = 'accordion-item';
                            
                            const horasTotales = grupo.tareas.reduce((total, tarea) => total + tarea.horas, 0);
                            
                            accordionItem.innerHTML = `
                                <h2 class="accordion-header" id="heading-proyecto-${index}">
                                    <button class="accordion-button ${index !== 0 ? 'collapsed' : ''}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-proyecto-${index}" aria-expanded="${index === 0 ? 'true' : 'false'}" aria-controls="collapse-proyecto-${index}">
                                        <div class="d-flex justify-content-between w-100 me-3">
                                            <span><i class="bi bi-folder me-2"></i>${escapeHTML(grupo.proyecto)}</span>
                                            <span class="badge bg-primary rounded-pill">${grupo.tareas.length} actividades · ${horasTotales}h</span>
                                        </div>
                                    </button>
                                </h2>
                                <div id="collapse-proyecto-${index}" class="accordion-collapse collapse ${index === 0 ? 'show' : ''}" aria-labelledby="heading-proyecto-${index}" data-bs-parent="#accordionProyectos">
                                    <div class="accordion-body">
                                        <div class="row">
                                            ${grupo.tareas.map(tarea => {
                                                const importanciaClass = tarea.importancia.toLowerCase() === 'alta' ? 'badge-alta' : 
                                                                        (tarea.importancia.toLowerCase() === 'media' ? 'badge-media' : 'badge-baja');
                                                const importanciaIcon = tarea.importancia.toLowerCase() === 'alta' ? '<i class="bi bi-exclamation-circle me-1"></i>' : 
                                                                      (tarea.importancia.toLowerCase() === 'media' ? '<i class="bi bi-star me-1"></i>' : '<i class="bi bi-check-circle me-1"></i>');
                                                const fecha = new Date(tarea.fecha);
                                                const fechaFormateada = fecha.toLocaleDateString('es-ES', { 
                                                    year: 'numeric', 
                                                    month: 'short', 
                                                    day: 'numeric' 
                                                });
                                                
                                                return `
                                                    <div class="col-md-6 col-lg-4">
                                                        <div class="card tarea-card">
                                                            <div class="card-body">
                                                                <h5 class="card-title">${escapeHTML(tarea.tema)}</h5>
                                                                <h6 class="card-subtitle mb-2 text-muted"><i class="bi bi-calendar me-1"></i>${escapeHTML(fechaFormateada)}</h6>
                                                                <div class="d-flex justify-content-between align-items-center mt-3">
                                                                    <span class="badge ${importanciaClass}">${importanciaIcon}${escapeHTML(tarea.importancia)}</span>
                                                                    <span><i class="bi bi-clock me-1"></i>${escapeHTML(tarea.horas)}h</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                `;
                                            }).join('')}
                                        </div>
                                    </div>
                                </div>
                            `;
                            
                            accordionProyectos.appendChild(accordionItem);
                        });
                    })
                    .catch(error => {
                        console.error('Error al cargar tareas por proyecto:', error);
                        document.getElementById('cargando-proyectos').innerHTML = '<p class="text-danger">Error al cargar las actividades</p>';
                    });
            });
        });
    </script>
</body>
</html>
