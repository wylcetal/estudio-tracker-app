<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento de Estudios</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container mt-4 fade-in">
        <h1 class="text-center mb-4"><i class="bi bi-calendar-check me-2"></i>Seguimiento de Actividades de Estudio</h1>
        
        <div class="row">
            <div class="col-md-8">
                <!-- Calendario -->
                <div class="card shadow border-0">
                    <div class="card-body">
                        <div id="calendario"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <!-- Formulario para agregar/editar tareas -->
                <div class="card shadow border-0">
                    <div class="card-header">
                        <h5 class="mb-0" id="form-title">Registrar Actividad</h5>
                    </div>
                    <div class="card-body">
                        <form id="tarea-form">
                            <input type="hidden" id="tarea-id">
                            <div class="mb-3">
                                <label for="fecha" class="form-label">Fecha</label>
                                <input type="date" class="form-control" id="fecha" required>
                            </div>
                            <div class="mb-3">
                                <label for="tema" class="form-label">Tema</label>
                                <input type="text" class="form-control" id="tema" placeholder="¿Qué estudiaste?" required>
                            </div>
                            <div class="mb-3">
                                <label for="horas" class="form-label">Horas de estudio</label>
                                <input type="number" class="form-control" id="horas" step="0.5" min="0.5" required>
                            </div>
                            <div class="mb-3">
                                <label for="proyecto" class="form-label">Proyecto</label>
                                <input type="text" class="form-control" id="proyecto" placeholder="¿A qué proyecto pertenece?" required>
                            </div>
                            <div class="mb-3">
                                <label for="importancia" class="form-label">Importancia</label>
                                <select class="form-select" id="importancia" required>
                                    <option value="">Selecciona la importancia</option>
                                    <option value="Alta">Alta</option>
                                    <option value="Media">Media</option>
                                    <option value="Baja">Baja</option>
                                </select>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary" id="guardar-btn"><i class="bi bi-save me-1"></i>Guardar</button>
                                <button type="button" class="btn btn-secondary" id="cancelar-btn" style="display: none;"><i class="bi bi-x-circle me-1"></i>Cancelar</button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- Botón para ver todas las actividades -->
                <div class="card shadow border-0 mt-4">
                    <div class="card-body text-center py-4">
                        <a href="/visualizar" class="btn btn-primary btn-lg">
                            <i class="bi bi-list-task me-2"></i>Ver Todas las Actividades
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para confirmar eliminación -->
    <div class="modal fade" id="eliminar-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    ¿Estás seguro de que deseas eliminar esta actividad?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"><i class="bi bi-x-circle me-1"></i>Cancelar</button>
                    <button type="button" class="btn btn-danger" id="confirmar-eliminar"><i class="bi bi-trash me-1"></i>Eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales-all.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
